version: '1.0'

services:
  web:
    image: my-django-app:latest
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings
      - DJANGO_SECRET_KEY=your-secret-key
      - DATABASE_URL=your-database-url
    volumes:
      - .:/app
    command: ["gunicorn", "myproject.wsgi:application", "--bind", "0.0.0.0:8000"]
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
